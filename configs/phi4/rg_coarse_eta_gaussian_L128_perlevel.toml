# Canonical 128^2 exploratory extension for the Gaussian coarse-eta branch.
# Per-level schedules are ordered from finest to coarsest nonterminal level.
# For L=128 these correspond to coarse lattices 64x64, 32x32, 16x16, 8x8, 4x4, 2x2.
#
# This card is intentionally conservative for a first A100 run:
#   4 -> 8 -> 16 -> 32 -> 64 -> 128 -> 256
# If 256 is easy, a later follow-up can extend the ramp to 512.

mode = "fresh"

[io]
save = "rg_coarse_eta_gauss_L128_m-0.4_l2.4_perlevel_w192-160-128-96-64-96_nc3-3-3-3-2-3_r1-1-1-1-1-2_eglevel_tglearned.pkl"
save_every = 1000

[physics]
L = 128
lam = 2.4
mass = -0.4

[model]
width = 96
width_levels = [192, 160, 128, 96, 64, 96]
n_cycles = 3
n_cycles_levels = [3, 3, 3, 3, 2, 3]
radius = 1
radius_levels = [1, 1, 1, 1, 1, 2]
eta_gaussian = "level"
gaussian_radius = 1
gaussian_radius_levels = [1, 1, 1, 1, 1, 1]
gaussian_width = 64
gaussian_width_levels = [64, 64, 64, 64, 64, 64]
terminal_prior = "learned"
terminal_n_layers = 2
terminal_width = 64
output_init_scale = 1e-2
parity = "sym"
rg_type = "average"
log_scale_clip = 5.0
offdiag_clip = 2.0

[train]
seed = 0

[schedule.ramp]
initial_batch = 4
epochs_per_stage = 1000
num_doubles = 6
lr = 3e-4

[schedule.anneal]
epoch_ends = [8000, 9000]
lrs = [1e-4, 3e-5]
batch = 256

[validation]
enabled = true
each_stage = true
batch = 32
super = 4
