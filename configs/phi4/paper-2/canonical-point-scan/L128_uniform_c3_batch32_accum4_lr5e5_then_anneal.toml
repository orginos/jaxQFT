mode = "fresh"

[io]
save = "ckpts/phi4/paper-2/canonical-point-scan/L128/rg_coarse_eta_gauss_L128_uniform_c3_batch32_accum4_lr5e5_then_anneal.pkl"
save_every = 1000

[physics]
L = 128
lam = 2.4
mass = -0.4

[model]
width = 64
n_cycles = 3
radius = 1
eta_gaussian = "level"
gaussian_radius = 1
gaussian_width = 64
terminal_prior = "learned"
terminal_n_layers = 2
terminal_width = 64
output_init_scale = 1e-2
parity = "sym"
rg_type = "average"
log_scale_clip = 5.0
offdiag_clip = 2.0

[train]
seed = 0
grad_accum_steps = 4

[schedule.ramp]
initial_batch = 32
epochs_per_stage = 3000
num_doubles = 0
lr = 5e-5

[schedule.anneal]
epoch_ends = [5000, 7000, 11000]
lrs = [5e-5, 2e-5, 1e-5]
batch = 32

[validation]
enabled = true
each_stage = true
batch = 16
super = 4
