mode = "fresh"

[io]
save = "rg_coarse_eta_gauss_fresh_example.pkl"
save_every = 0

[physics]
L = 16
lam = 2.4
mass = -0.4

[model]
width = 64
width_levels = [96, 64, 96]
n_cycles = 2
n_cycles_levels = [3, 2, 3]
radius = 1
radius_levels = [1, 1, 2]
eta_gaussian = "level"
gaussian_radius = 1
gaussian_radius_levels = [1, 1, 1]
gaussian_width = 64
gaussian_width_levels = [64, 64, 64]
terminal_prior = "learned"
terminal_n_layers = 2
terminal_width = 64
output_init_scale = 1e-2
parity = "sym"
rg_type = "average"
log_scale_clip = 5.0
offdiag_clip = 2.0

[train]
batch = 32
lr = 3e-4
seed = 0

[schedule.ramp]
initial_batch = 32
epochs_per_stage = 1000
num_doubles = 5
lr = 3e-4

[schedule.anneal]
epoch_ends = [7000, 8000]
lrs = [1e-4, 3e-5]
batch = 1024

[validation]
enabled = true
each_stage = true
batch = 256
super = 4
